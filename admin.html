<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Choudhary Digital Craft</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="page-hero">
    <div class="container">

        <h1>Admin Dashboard</h1>
        <p>Manage Courses, E-Books, Students and Payments</p>

    </div>
</section>

<section>
<div class="container">

<div class="courses-grid">

<div class="card">
<div class="card-body">
<h3>Total Students</h3>
<h2>0</h2>
</div>
</div>

<div class="card">
<div class="card-body">
<h3>Total Courses</h3>
<h2>0</h2>
</div>
</div>

<div class="card">
<div class="card-body">
<h3>Total E-Books</h3>
<h2>0</h2>
</div>
</div>

<div class="card">
<div class="card-body">
<h3>Total Revenue</h3>
<h2>₹0</h2>
</div>
</div>

</div>

</div>
</section>

<section>
<div class="container">

<div class="section-header">
<span class="label">COURSES</span>
<h2>Add New Course</h2>
</div>

<div class="card">
<div class="card-body">

<form>

<div class="form-group">
<label class="form-label">Course Name</label>
<input type="text">
</div>

<div class="form-group">
<label class="form-label">Price</label>
<input type="number">
</div>

<div class="form-group">
<label class="form-label">Description</label>
<textarea rows="4"></textarea>
</div>

<button class="btn btn-primary">
Add Course
</button>

</form>

</div>
</div>

</div>
</section>

<section>
<div class="container">

<div class="section-header">
<span class="label">EBOOKS</span>
<h2>Upload E-Book</h2>
</div>

<div class="card">
<div class="card-body">

<form>

<div class="form-group">
<label class="form-label">Book Title</label>
<input type="text">
</div>

<div class="form-group">
<label class="form-label">Price</label>
<input type="number">
</div>

<div class="form-group">
<label class="form-label">PDF File</label>
<input type="file">
</div>

<button class="btn btn-primary">
Upload E-Book
</button>

</form>

</div>
</div>

</div>
</section>

<script src="app.js"></script>

</body>
</html>
