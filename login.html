<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Choudhary Digital Craft</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="page-hero">
        <div class="container-sm">

            <h1>Login</h1>
            <p>Access your account and continue learning.</p>

            <div class="card mt-4">
                <div class="card-body">

                    <form id="loginForm">

                        <div class="form-group">
                            <label class="form-label">
                                Email
                            </label>

                            <input
                                type="email"
                                id="loginEmail"
                                placeholder="Enter Email"
                                required
                            >
                        </div>

                        <div class="form-group">
                            <label class="form-label">
                                Password
                            </label>

                            <input
                                type="password"
                                id="loginPassword"
                                placeholder="Enter Password"
                                required
                            >
                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary w-100"
                        >
                            Login
                        </button>

                    </form>

                    <div class="mt-3 text-center">

                        <p>
                            Don't have an account?
                            <a href="register.html">
                                Register
                            </a>
                        </p>

                    </div>

                </div>
            </div>

        </div>
    </section>

    <script src="app.js"></script>

</body>
</html>
